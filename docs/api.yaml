openapi: 3.1.0

info:
  title: KT myspeed 카카오 웹뷰 API
  version: 0.3.0
  description: |
    카카오 알림톡 진입 → OTP 인증 → 예약 조회/변경/확정.
    응답은 envelope 패턴 `{resultCode, resultMessage, data}` + camelCase.
    정상은 `resultCode = 2000` (integer), 그 외는 에러.
    백엔드가 `extraBoolean` 필드를 같이 내려주지만 클라이언트는 무시.

    네이밍: 백엔드 응답은 풀이름 camelCase (예: `workReceiptNo`, `customerName`).
    사내 약어(wrkRcpNo 등)는 path 파라미터·내부 변수에서만 사용.
    예약 외 endpoint(/order/*, /auth/*)는 백엔드 확정 전 — 응답 컨벤션 미정.

servers:
  - url: https://api-dev.example.com/api
    description: 개발
  - url: https://api.example.com/api
    description: 운영

tags:
  - name: auth
    description: OTP 발송·검증·마스킹 연락처
  - name: order
    description: 오더 상태·작업자 정보
  - name: reservation
    description: 예약 상세 조회 (토큰 필요)

paths:
  /auth/otp/request:
    post:
      tags: [auth]
      summary: 인증번호 발송
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequestPayload'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeNull'

  /auth/otp/verify:
    post:
      tags: [auth]
      summary: 인증번호 검증 (토큰 발급)
      description: |
        성공 시 응답 헤더로 토큰 전달.
        - `Set-Cookie: token=...; HttpOnly; Secure; SameSite=Strict`
        - 또는 `Authorization: Bearer <jwt>`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyPayload'
      responses:
        '200':
          description: 성공 (토큰 발급)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: 'token=...; HttpOnly; Secure; SameSite=Strict'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeNull'
        '400':
          description: 인증번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/phonenum/{wrkRcpNo}:
    get:
      tags: [auth]
      summary: 마스킹된 고객 연락처 조회
      description: OTP 발송 화면에서 본인 번호 표시용. 마스킹은 백엔드에서 처리.
      parameters:
        - $ref: '#/components/parameters/WrkRcpNoPath'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCustPhoneMask'

  /order/status/{wrkRcpNo}:
    get:
      tags: [order]
      summary: 오더 상태 조회
      description: 카톡 진입 직후 호출. 동시 오더 묶음 정보 반환.
      parameters:
        - $ref: '#/components/parameters/WrkRcpNoPath'
        - name: reservationDate
          in: query
          required: true
          description: 예약일시 (YYYYMMDDHHMM 형식)
          schema:
            type: string
            pattern: '^\d{12}$'
          example: '202605130900'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeOrderStatus'
        '400':
          $ref: '#/components/responses/ErrorEnvelope'

  /order/worker/{wrkRcpNo}:
    get:
      tags: [order]
      summary: 작업자 정보 조회
      description: |
        조건: 당일 방문 (`wrkFlowSttusCd = '4'`) 일 때만 조회 가능.
        응답의 `spotWrkUserPic`은 정적 이미지 경로 (예: `/order/images/workers/{wrkRcpNo}`).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WrkRcpNoPath'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeTechnician'
        '404':
          $ref: '#/components/responses/ErrorEnvelope'

  /reservation/{workReceiptNo}:
    get:
      tags: [reservation]
      summary: 예약 상세 조회
      description: |
        OTP 인증 후 호출. 동시 묶음 오더 포함.
        백엔드 실제 응답 (2026-05-27 수신) — 필드명 풀이름 camelCase.
        `reservationDate`는 datetime 형식이지만 시각 부분은 의미 없음.
        실제 예약 시간대는 `reservationTimeOfDay`(`"HHMM"`) 별도 필드.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkReceiptNoPath'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeReservationDetail'
        '401':
          $ref: '#/components/responses/ErrorEnvelope'
        '404':
          $ref: '#/components/responses/ErrorEnvelope'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Set-Cookie 방식과 병행 가능. Cookie 방식이면 axios `withCredentials: true`로 자동 첨부.

  parameters:
    WrkRcpNoPath:
      name: wrkRcpNo
      in: path
      required: true
      description: 작업접수번호 (예 1O2026050712345). 사내 약어 path — 백엔드 미정합 endpoint에서 사용.
      schema:
        type: string
      example: '1O2026050712345'

    WorkReceiptNoPath:
      name: workReceiptNo
      in: path
      required: true
      description: 작업접수번호 (풀이름). 백엔드 정합 완료된 reservation endpoint에서 사용.
      schema:
        type: string
      example: '1O202410230FF20'

  responses:
    ErrorEnvelope:
      description: 에러 (resultCode != 2000)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeError'

  schemas:
    Envelope:
      type: object
      required: [resultCode, resultMessage, data]
      properties:
        resultCode:
          type: integer
          description: 정상은 2000. 그 외는 에러.
          example: 2000
        resultMessage:
          type: string
          example: '성공하였습니다.'
        data:
          nullable: true
        extraBoolean:
          type: boolean
          description: 백엔드가 항상 내려주지만 클라이언트는 무시. 타입·존재만 명시.
          example: false

    EnvelopeNull:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: 'null'

    EnvelopeError:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            resultCode:
              example: 9999
            resultMessage:
              example: '오더 정보를 찾을 수 없습니다.'
            data:
              type: 'null'

    OtpRequestPayload:
      type: object
      required: [wrkRcpNo]
      properties:
        wrkRcpNo:
          type: string
          example: '1O2026050712345'

    OtpVerifyPayload:
      type: object
      required: [otpNo]
      properties:
        otpNo:
          type: string
          description: 인증번호
          example: '123456'

    CustPhoneMask:
      type: object
      required: [custPhoneMask]
      properties:
        custPhoneMask:
          type: string
          description: 마스킹된 고객 휴대폰
          example: '010-****-5678'

    EnvelopeCustPhoneMask:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CustPhoneMask'

    OrderStatus:
      type: object
      required: [smtCnt, orders, progressCd]
      properties:
        smtCnt:
          type: integer
          description: 동시건수
          example: 2
        orders:
          type: array
          description: 묶음 오더의 작업접수번호 목록
          items:
            type: string
          example: ['1O2026050712345', '1O2026050712346']
        progressCd:
          type: string
          description: 진행상태 코드 (원스톱·진행상태 등 판단)

    EnvelopeOrderStatus:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OrderStatus'

    Technician:
      type: object
      required: [workerName, workerPhoneNumber, workerPhotoUrl]
      properties:
        workerName:
          type: string
          example: '허슈미'
        workerPhoneNumber:
          type: string
          description: 하이픈 포함 또는 미포함 (백엔드 응답 그대로). 클라이언트 tel 링크 시 숫자만 추출
          example: '010-2222-3333'
        workerPhotoUrl:
          type: string
          description: 작업자 사진 정적 경로 (없으면 빈 문자열)
          example: '/images/workers/1O202410230FF20'
      # 비고: 이전 스키마는 spotWrkUserId/Nm/HpNo/Pic. 백엔드 실 응답이 worker* 필드명으로
      # 평탄화되어 있어 갱신. ID 필드는 응답에 없음.

    EnvelopeTechnician:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Technician'

    ReservationDetail:
      type: object
      required:
        - customerName
        - reservationDate
        - reservationTimeOfDay
        - spotWorkTypeCode
        - sameTimeOrderCount
        - orders
      properties:
        customerName:
          type: string
          description: 고객명
          example: '삼준식'
        reservationDate:
          type: string
          description: |
            예약일시 (`YYYY-MM-DD HH:MM:SS`). datetime 형식이지만 시각 부분은 의미 없음.
            실제 시간대는 `reservationTimeOfDay` 별도 필드.
          example: '2025-12-13 00:00:00'
        reservationTimeOfDay:
          type: string
          description: 예약 시간대 (`HHMM`, 정시 기준)
          pattern: '^\d{4}$'
          example: '0900'
        spotWorkTypeCode:
          type: string
          description: |
            현장작업 종류 코드 (정수 문자열). reservation 단위 — 묶음 전체에 동일 적용.
            - "1" = 개통 (INSTALL)
            - "2" = 수리 (AS)
            - 그 외 코드(이전·취소·철거 등) 사전 백엔드 확인 필요.
          example: '1'
        sameTimeOrderCount:
          type: integer
          description: 동시건수 (orders 길이와 같을 것으로 추정)
          example: 6
        orders:
          type: array
          description: 같은 시간대 묶음 오더 목록
          items:
            $ref: '#/components/schemas/ReservationOrder'

    ReservationOrder:
      type: object
      required: [workReceiptNo, serviceName]
      properties:
        workReceiptNo:
          type: string
          description: 작업접수번호
          example: '1O202410230FF20'
        serviceName:
          type: string
          description: 상품(서비스)명
          example: '에센스/베이직 인터넷'
        serviceLctgName:
          type: string
          description: |
            서비스 카테고리명. **백엔드 인계 요청 중 — 정합 전.**
            값 후보 (사용자 합의): "인터넷", "인터넷전화", "TV", "IoT".
            카드 오더 row의 카테고리 아이콘·라벨 분기에 사용.
          example: '인터넷'

    EnvelopeReservationDetail:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ReservationDetail'
