openapi: 3.1.0

info:
  title: KT myspeed 카카오 웹뷰 API
  version: 0.2.0
  description: |
    카카오 알림톡 진입 → OTP 인증 → 예약 조회/변경/확정.
    응답은 envelope 패턴 `{resultCode, resultMessage, data}` + camelCase.
    정상은 `resultCode = "2000"`, 그 외는 에러.

    이 문서에는 백엔드 확정된 엔드포인트만 포함.
    예약(reservation) 관련 엔드포인트는 백엔드 확정 후 추가 예정.

servers:
  - url: https://api-dev.example.com/api
    description: 개발
  - url: https://api.example.com/api
    description: 운영

tags:
  - name: auth
    description: OTP 발송·검증·마스킹 연락처
  - name: order
    description: 오더 상태·작업자 정보

paths:
  /auth/otp/request:
    post:
      tags: [auth]
      summary: 인증번호 발송
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequestPayload'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeNull'

  /auth/otp/verify:
    post:
      tags: [auth]
      summary: 인증번호 검증 (토큰 발급)
      description: |
        성공 시 응답 헤더로 토큰 전달.
        - `Set-Cookie: token=...; HttpOnly; Secure; SameSite=Strict`
        - 또는 `Authorization: Bearer <jwt>`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyPayload'
      responses:
        '200':
          description: 성공 (토큰 발급)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: 'token=...; HttpOnly; Secure; SameSite=Strict'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeNull'
        '400':
          description: 인증번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/phonenum/{wrkRcpNo}:
    get:
      tags: [auth]
      summary: 마스킹된 고객 연락처 조회
      description: OTP 발송 화면에서 본인 번호 표시용. 마스킹은 백엔드에서 처리.
      parameters:
        - $ref: '#/components/parameters/WrkRcpNoPath'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCustPhoneMask'

  /order/status/{wrkRcpNo}:
    get:
      tags: [order]
      summary: 오더 상태 조회
      description: 카톡 진입 직후 호출. 동시 오더 묶음 정보 반환.
      parameters:
        - $ref: '#/components/parameters/WrkRcpNoPath'
        - name: reservationDate
          in: query
          required: true
          description: 예약일시 (YYYYMMDDHHMM 형식)
          schema:
            type: string
            pattern: '^\d{12}$'
          example: '202605130900'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeOrderStatus'
        '400':
          $ref: '#/components/responses/ErrorEnvelope'

  /order/worker/{wrkRcpNo}:
    get:
      tags: [order]
      summary: 작업자 정보 조회
      description: |
        조건: 당일 방문 (`wrkFlowSttusCd = '4'`) 일 때만 조회 가능.
        응답의 `spotWrkUserPic`은 정적 이미지 경로 (예: `/order/images/workers/{wrkRcpNo}`).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WrkRcpNoPath'
      responses:
        '200':
          description: 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeTechnician'
        '404':
          $ref: '#/components/responses/ErrorEnvelope'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Set-Cookie 방식과 병행 가능. Cookie 방식이면 axios `withCredentials: true`로 자동 첨부.

  parameters:
    WrkRcpNoPath:
      name: wrkRcpNo
      in: path
      required: true
      description: 작업접수번호 (예 1O2026050712345)
      schema:
        type: string
      example: '1O2026050712345'

  responses:
    ErrorEnvelope:
      description: 에러 (resultCode != '2000')
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeError'

  schemas:
    Envelope:
      type: object
      required: [resultCode, resultMessage, data]
      properties:
        resultCode:
          type: string
          description: 정상은 '2000'. 그 외는 에러.
          example: '2000'
        resultMessage:
          type: string
          example: '정상'
        data:
          nullable: true

    EnvelopeNull:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: 'null'

    EnvelopeError:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            resultCode:
              example: '9999'
            resultMessage:
              example: '오더 정보를 찾을 수 없습니다.'
            data:
              type: 'null'

    OtpRequestPayload:
      type: object
      required: [wrkRcpNo]
      properties:
        wrkRcpNo:
          type: string
          example: '1O2026050712345'

    OtpVerifyPayload:
      type: object
      required: [otpNo]
      properties:
        otpNo:
          type: string
          description: 인증번호
          example: '123456'

    CustPhoneMask:
      type: object
      required: [custPhoneMask]
      properties:
        custPhoneMask:
          type: string
          description: 마스킹된 고객 휴대폰
          example: '010-****-5678'

    EnvelopeCustPhoneMask:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CustPhoneMask'

    OrderStatus:
      type: object
      required: [smtCnt, orders, progressCd]
      properties:
        smtCnt:
          type: integer
          description: 동시건수
          example: 2
        orders:
          type: array
          description: 묶음 오더의 작업접수번호 목록
          items:
            type: string
          example: ['1O2026050712345', '1O2026050712346']
        progressCd:
          type: string
          description: 진행상태 코드 (원스톱·진행상태 등 판단)

    EnvelopeOrderStatus:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OrderStatus'

    Technician:
      type: object
      required: [spotWrkUserId, spotWrkUserNm, spotWrkUserHpNo, spotWrkUserPic]
      properties:
        spotWrkUserId:
          type: string
          example: '82273967'
        spotWrkUserNm:
          type: string
          example: '염수홍'
        spotWrkUserHpNo:
          type: string
          example: '01000000000'
        spotWrkUserPic:
          type: string
          description: 작업자 사진 정적 경로
          example: '/order/images/workers/1O2026050712345'

    EnvelopeTechnician:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Technician'
