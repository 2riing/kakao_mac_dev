<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KT 고객방문 예약변경 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0eee9; min-height: 100vh; font-family: 'Noto Sans KR', sans-serif; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
@keyframes slideIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">


const { useState, useEffect, useRef, useCallback } = React;

/* ─── Brand tokens ─────────────────────────────────────── */
const C = {
  red: '#E60012', redD: '#c0000f', redL: '#fff0f0', redBorder: '#ffd0d0',
  black: '#1a1a1a', g700: '#444', g500: '#888', g400: '#aaa',
  g300: '#ccc', g200: '#e5e5e5', g100: '#f5f5f5', white: '#fff',
  success: '#00a651', border: '#e0e0e0', warn: '#fffbf0', warnBorder: '#ffe0a0'
};

/* ─── Shared micro-components ──────────────────────────── */
function KTLogo() {
  return (
    <svg width="44" height="22" viewBox="0 0 44 22">
      <text x="1" y="19" fontFamily="'Noto Sans KR', Arial Black, sans-serif"
      fontWeight="800" fontSize="20" fill={C.red} letterSpacing="-1">KT</text>
    </svg>);

}

function BackArrow({ color = C.black }) {
  return (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M15 19l-7-7 7-7" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>);

}

function CheckIcon({ color = C.success }) {
  return (
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="36" fill={color} fillOpacity="0.1" />
      <circle cx="36" cy="36" r="26" fill={color} fillOpacity="0.18" />
      <circle cx="36" cy="36" r="18" fill={color} />
      <path d="M25 36l8 8 14-16" stroke="white" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round" />
    </svg>);

}

function AlertIcon() {
  return (
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="36" fill={C.g200} />
      <circle cx="36" cy="36" r="22" fill={C.g300} />
      <rect x="33.5" y="22" width="5" height="18" rx="2.5" fill="white" />
      <circle cx="36" cy="47" r="3" fill="white" />
    </svg>);

}

function Spinner({ color = 'white', size = 20 }) {
  return (
    <span style={{
      display: 'inline-block', width: size, height: size,
      border: `2.5px solid ${color === 'white' ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.15)'}`,
      borderTopColor: color,
      borderRadius: '50%', animation: 'spin 0.7s linear infinite', verticalAlign: 'middle'
    }} />);

}

function CSNote() {
  return (
    <div style={{ textAlign: 'center', padding: '10px 0 2px', fontSize: 12, color: C.g400 }}>
      문의: KT 고객센터 <strong style={{ color: C.g500 }}>100</strong>
    </div>);

}

function InfoRow({ label, value }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 11 }}>
      <span style={{ fontSize: 13, color: C.g500, minWidth: 76, flexShrink: 0 }}>{label}</span>
      <span style={{ fontSize: 14, color: C.black, fontWeight: 500, textAlign: 'right', lineHeight: 1.4 }}>{value}</span>
    </div>);

}

function StepBar({ current, total }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 18 }}>
      {Array.from({ length: total }).map((_, i) =>
      <div key={i} style={{
        height: 5, borderRadius: 3,
        width: i < current ? 28 : 18,
        backgroundColor: i < current ? C.red : C.g200,
        transition: 'all 0.3s'
      }} />
      )}
      <span style={{ marginLeft: 4, fontSize: 12, color: C.g500, fontWeight: 500 }}>{current}/{total} 단계</span>
    </div>);

}

/* ─── Layout constants ─────────────────────────────────── */
const screenStyle = {
  width: '100%', height: '100%', display: 'flex', flexDirection: 'column',
  backgroundColor: C.g100, fontFamily: "'Noto Sans KR', sans-serif",
  overflow: 'hidden', position: 'relative'
};
const topBarStyle = {
  height: 52, backgroundColor: C.white, display: 'flex',
  alignItems: 'center', padding: '0 14px',
  borderBottom: `1px solid ${C.border}`, flexShrink: 0, position: 'relative'
};
const scrollBodyStyle = {
  flex: 1, overflowY: 'auto', padding: '18px 16px 96px', overflowX: 'hidden'
};
const cardStyle = {
  backgroundColor: C.white, borderRadius: 12, padding: '16px',
  marginBottom: 12, boxShadow: '0 2px 10px rgba(0,0,0,0.06)',
  border: `1px solid ${C.border}`
};
const bottomFixedStyle = {
  position: 'absolute', bottom: 0, left: 0, right: 0,
  backgroundColor: C.white, padding: '10px 16px 16px',
  borderTop: `1px solid ${C.border}`
};
const btnPrimary = {
  height: 50, width: '100%', backgroundColor: C.red, color: C.white,
  border: 'none', borderRadius: 10, fontSize: 15, fontWeight: 700,
  cursor: 'pointer', fontFamily: "'Noto Sans KR', sans-serif",
  letterSpacing: '-0.3px', transition: 'opacity 0.15s'
};
const btnSecondary = {
  height: 50, width: '100%', backgroundColor: C.white, color: C.red,
  border: `1.5px solid ${C.red}`, borderRadius: 10, fontSize: 15, fontWeight: 700,
  cursor: 'pointer', fontFamily: "'Noto Sans KR', sans-serif", letterSpacing: '-0.3px'
};
const btnDisabled = {
  height: 50, width: '100%', backgroundColor: C.g300, color: C.white,
  border: 'none', borderRadius: 10, fontSize: 15, fontWeight: 600,
  cursor: 'not-allowed', fontFamily: "'Noto Sans KR', sans-serif"
};
const inputStyle = {
  width: '100%', height: 46, border: `1.5px solid ${C.border}`, borderRadius: 10,
  padding: '0 14px', fontSize: 14, fontFamily: "'Noto Sans KR', sans-serif",
  color: C.black, outline: 'none', backgroundColor: C.white
};
const inputReadonlyStyle = { ...inputStyle, backgroundColor: C.g100, color: C.g500 };

/* ─── Screen 1: OTP ─────────────────────────────────────── */
function Screen1({ onNext }) {
  const [sent, setSent] = useState(false);
  const [otp, setOtp] = useState('');
  const [timer, setTimer] = useState(180);
  const [sendLoading, setSendLoading] = useState(false);
  const [verifyLoading, setVerifyLoading] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    if (sent && timer > 0) {
      timerRef.current = setTimeout(() => setTimer((t) => t - 1), 1000);
      return () => clearTimeout(timerRef.current);
    }
  }, [sent, timer]);

  const mm = String(Math.floor(timer / 60)).padStart(2, '0');
  const ss = String(timer % 60).padStart(2, '0');

  const canVerify = sent && otp.length >= 4;

  return (
    <div style={screenStyle}>
      {/* header */}
      <div style={{ ...topBarStyle, justifyContent: 'center', flexDirection: 'column', height: 72, gap: 2 }}>
        <KTLogo />
      </div>

      <div style={scrollBodyStyle}>
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 21, fontWeight: 700, color: C.black, marginBottom: 6 }}>본인인증</div>
          <div style={{ fontSize: 14, color: C.g500, lineHeight: 1.65 }}>
            예약 확인을 위해 본인인증이 필요합니다.
          </div>
        </div>

        {/* 휴대폰 */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 12, color: C.g500, marginBottom: 5, fontWeight: 500 }}>휴대폰 번호</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input style={{ ...inputReadonlyStyle, flex: 1 }} value="010-****-1234" readOnly />
            <button
              onClick={() => {setSendLoading(true);setTimeout(() => {setSendLoading(false);setSent(true);setTimer(180);setOtp('');}, 1200);}}
              style={{ ...btnPrimary, width: 110, padding: 0, fontSize: 13, flexShrink: 0, opacity: sendLoading ? 0.7 : 1 }}>
              
              {sendLoading ? <Spinner /> : sent ? '재발송' : '인증번호 받기'}
            </button>
          </div>
        </div>

        {/* OTP field */}
        {sent &&
        <div style={{ marginBottom: 14, animation: 'fadeIn 0.3s' }}>
            <div style={{ fontSize: 12, color: C.g500, marginBottom: 5, fontWeight: 500 }}>인증번호</div>
            <div style={{ position: 'relative' }}>
              <input
              style={{ ...inputStyle, paddingRight: 68 }}
              placeholder="인증번호 입력 (4~6자리)"
              maxLength={6}
              value={otp}
              onChange={(e) => setOtp(e.target.value.replace(/\D/g, ''))} />
            
              <span style={{
              position: 'absolute', right: 13, top: '50%', transform: 'translateY(-50%)',
              fontSize: 14, fontWeight: 700, color: timer > 30 ? C.red : '#ff4400'
            }}>{mm}:{ss}</span>
            </div>
            <div style={{ fontSize: 12, color: C.g400, marginTop: 5, lineHeight: 1.5 }}>
              인증번호가 오지 않으면 재발송 버튼을 눌러주세요.
            </div>
          </div>
        }

        <CSNote />
      </div>

      <div style={bottomFixedStyle}>
        <button
          onClick={() => {if (!canVerify) return;setVerifyLoading(true);setTimeout(() => {setVerifyLoading(false);onNext();}, 1200);}}
          style={canVerify ? { ...btnPrimary, opacity: verifyLoading ? 0.7 : 1 } : btnDisabled}>
          
          {verifyLoading ? <Spinner /> : '확인'}
        </button>
      </div>
    </div>);

}

/* ─── Screen 2: 예약 확인 ───────────────────────────────── */
function Screen2({ onConfirm, onChange }) {
  const [loadC, setLoadC] = useState(false);
  const [loadCh, setLoadCh] = useState(false);
  return (
    <div style={screenStyle}>
      <div style={topBarStyle}>
        <div style={{ width: 36 }} />
        <span style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', fontSize: 16, fontWeight: 700, color: C.black }}>방문 예약 안내</span>
      </div>

      <div style={scrollBodyStyle}>
        <div style={{ backgroundColor: C.redL, border: `1px solid ${C.redBorder}`, borderRadius: 12, padding: '14px 16px', marginBottom: 16 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.black, marginBottom: 4 }}>김민준 고객님, 안녕하세요.</div>
          <div style={{ fontSize: 13, color: C.g700, lineHeight: 1.65 }}>내일 방문 예정인 작업을 확인해 주세요.</div>
        </div>

        <div style={cardStyle}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.black, marginBottom: 13, paddingBottom: 11, borderBottom: `1px solid ${C.g200}` }}>
            방문 예약 정보
          </div>
          <InfoRow label="작업 종류" value="인터넷 개통" />
          <InfoRow label="방문 예정일" value="2026년 4월 28일 (화)" />
          <InfoRow label="방문 시간대" value="14:00 ~ 15:00" />
          <InfoRow label="설치 주소" value="인천광역시 연수구 송도동 12-34, 101호" />
          <InfoRow label="상품" value="KT 인터넷 에센스" />
        </div>

        <div style={{ fontSize: 12, color: C.g500, textAlign: 'center', marginBottom: 4 }}>
          ⚠ 방문 1일 전까지 변경 가능합니다.
        </div>
        <CSNote />
      </div>

      <div style={{ ...bottomFixedStyle, display: 'flex', gap: 9 }}>
        <button
          onClick={() => {setLoadCh(true);setTimeout(() => {setLoadCh(false);onChange();}, 700);}}
          style={{ ...btnSecondary, opacity: loadCh ? 0.7 : 1 }}>
          
          {loadCh ? <Spinner color={C.red} /> : '예약 변경'}
        </button>
        <button
          onClick={() => {setLoadC(true);setTimeout(() => {setLoadC(false);onConfirm();}, 1000);}}
          style={{ ...btnPrimary, opacity: loadC ? 0.7 : 1 }}>
          
          {loadC ? <Spinner /> : '예약 확정'}
        </button>
      </div>
    </div>);

}

/* ─── Screen 3: 예약 확정 완료 ──────────────────────────── */
function Screen3({ onClose }) {
  return (
    <div style={screenStyle}>
      <div style={topBarStyle}>
        <span style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', fontSize: 16, fontWeight: 700 }}>예약 확정</span>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 24px' }}>
        <CheckIcon color={C.success} />
        <div style={{ fontSize: 20, fontWeight: 700, color: C.black, marginTop: 18, marginBottom: 8 }}>예약이 확정되었습니다</div>
        <div style={{ fontSize: 13, color: C.g500, textAlign: 'center', lineHeight: 1.7, marginBottom: 24 }}>
          방문 당일 작업자 정보를<br />별도로 안내드립니다.
        </div>
        <div style={{ ...cardStyle, width: '100%', backgroundColor: C.g100, boxShadow: 'none' }}>
          <InfoRow label="방문 예정일" value="2026년 4월 28일 (화)" />
          <InfoRow label="방문 시간대" value="14:00 ~ 15:00" />
          <InfoRow label="설치 주소" value="인천광역시 연수구 송도동 12-34" />
        </div>
      </div>
      <div style={bottomFixedStyle}>
        <button onClick={onClose} style={btnPrimary}>확인</button>
      </div>
    </div>);

}

/* ─── Screen 4: 날짜 선택 ───────────────────────────────── */
const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
const UNAVAIL_DATES = [26, 27]; // April unavailable

function Screen4({ onNext, onBack }) {
  const [sel, setSel] = useState(null);
  const [cm, setCm] = useState({ y: 2026, m: 4 });
  const today = { y: 2026, m: 4, d: 24 };

  const daysInMonth = new Date(cm.y, cm.m, 0).getDate();
  const firstDay = new Date(cm.y, cm.m - 1, 1).getDay();

  function isDisabled(d) {
    if (cm.y < today.y || cm.y === today.y && cm.m < today.m) return true;
    if (cm.y === today.y && cm.m === today.m && d <= today.d) return true;
    if (cm.y > 2026 || cm.y === 2026 && cm.m > 5) return true;
    if (cm.m === 4 && UNAVAIL_DATES.includes(d)) return true;
    return false;
  }

  const isSel = (d) => sel && sel.d === d && sel.m === cm.m && sel.y === cm.y;

  function prevMonth() {
    setCm((m) => m.month === 1 ? { y: m.y - 1, m: 12 } : { ...m, m: m.m - 1 });
  }
  function nextMonth() {
    setCm((m) => m.month === 12 ? { y: m.y + 1, m: 1 } : { ...m, m: m.m + 1 });
  }

  return (
    <div style={screenStyle}>
      <div style={topBarStyle}>
        <div style={{ cursor: 'pointer', padding: 6 }} onClick={onBack}><BackArrow /></div>
        <span style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', fontSize: 16, fontWeight: 700 }}>예약 변경</span>
      </div>

      <div style={scrollBodyStyle}>
        <StepBar current={1} total={2} />
        <div style={{ fontSize: 15, fontWeight: 600, color: C.black, marginBottom: 16 }}>변경하실 날짜를 선택해 주세요.</div>

        <div style={cardStyle}>
          {/* Month nav */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <button onClick={prevMonth} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '6px 10px', borderRadius: 8, color: C.black }}>
              <BackArrow />
            </button>
            <span style={{ fontSize: 16, fontWeight: 700 }}>{cm.y}년 {cm.m}월</span>
            <button onClick={nextMonth} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '6px 10px', borderRadius: 8, transform: 'scaleX(-1)' }}>
              <BackArrow />
            </button>
          </div>

          {/* Day headers */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', marginBottom: 6 }}>
            {DAY_NAMES.map((d, i) =>
            <div key={d} style={{ textAlign: 'center', fontSize: 12, fontWeight: 600, padding: '4px 0',
              color: i === 0 ? C.red : i === 6 ? '#2060cc' : C.g500 }}>{d}</div>
            )}
          </div>

          {/* Cells */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)' }}>
            {Array.from({ length: firstDay }).map((_, i) => <div key={'e' + i} style={{ height: 38 }} />)}
            {Array.from({ length: daysInMonth }).map((_, i) => {
              const d = i + 1;
              const dis = isDisabled(d);
              const selected = isSel(d);
              const col = (firstDay + i) % 7;
              const textColor = selected ? C.white : dis ? C.g300 : col === 0 ? C.red : col === 6 ? '#2060cc' : C.black;
              return (
                <div key={d} onClick={() => !dis && setSel({ y: cm.y, m: cm.m, d })}
                style={{
                  height: 38, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  borderRadius: '50%', fontSize: 14,
                  backgroundColor: selected ? C.red : 'transparent',
                  color: textColor, fontWeight: selected ? 700 : 400,
                  cursor: dis ? 'not-allowed' : 'pointer',
                  transition: 'background 0.15s'
                }}>
                  {d}
                </div>);

            })}
          </div>
        </div>

        {sel &&
        <div style={{ fontSize: 13, color: C.g700, textAlign: 'center', marginTop: 4, fontWeight: 500 }}>
            선택: <span style={{ color: C.red, fontWeight: 700 }}>{sel.y}년 {sel.m}월 {sel.d}일 ({DAY_NAMES[new Date(sel.y, sel.m - 1, sel.d).getDay()]})</span>
          </div>
        }
      </div>

      <div style={bottomFixedStyle}>
        <button onClick={() => sel && onNext(sel)} style={sel ? btnPrimary : btnDisabled} disabled={!sel}>
          다음
        </button>
      </div>
    </div>);

}

/* ─── Screen 5: 시간대 선택 ─────────────────────────────── */
const TIME_SLOTS = [
{ label: '09:00 ~ 10:00', avail: true },
{ label: '10:00 ~ 11:00', avail: true },
{ label: '11:00 ~ 12:00', avail: false },
{ label: '12:00 ~ 13:00', avail: true },
{ label: '13:00 ~ 14:00', avail: false },
{ label: '14:00 ~ 15:00', avail: true },
{ label: '15:00 ~ 16:00', avail: true },
{ label: '16:00 ~ 17:00', avail: false }];


function Screen5({ selDate, onNext, onBack }) {
  const [selTime, setSelTime] = useState(null);
  const [loading, setLoading] = useState(false);
  const dow = selDate ? DAY_NAMES[new Date(selDate.y, selDate.m - 1, selDate.d).getDay()] : '';

  return (
    <div style={screenStyle}>
      <div style={topBarStyle}>
        <div style={{ cursor: 'pointer', padding: 6 }} onClick={onBack}><BackArrow /></div>
        <span style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', fontSize: 16, fontWeight: 700 }}>예약 변경</span>
      </div>

      <div style={scrollBodyStyle}>
        <StepBar current={2} total={2} />

        {selDate &&
        <div style={{ backgroundColor: C.redL, border: `1px solid ${C.redBorder}`, borderRadius: 10, padding: '10px 14px', marginBottom: 14, fontSize: 14, fontWeight: 600, color: C.black }}>
            {selDate.y}년 {selDate.m}월 {selDate.d}일 ({dow})
          </div>
        }

        <div style={{ fontSize: 15, fontWeight: 600, color: C.black, marginBottom: 14 }}>원하시는 시간대를 선택해 주세요.</div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 9, marginBottom: 12 }}>
          {TIME_SLOTS.map((slot) => {
            const sel = selTime === slot.label;
            return (
              <button key={slot.label} onClick={() => slot.avail && setSelTime(slot.label)}
              style={{
                height: 56, borderRadius: 10, fontSize: 13, fontWeight: sel ? 700 : 500,
                border: sel ? 'none' : `1.5px solid ${slot.avail ? C.border : C.g200}`,
                backgroundColor: sel ? C.red : slot.avail ? C.white : C.g100,
                color: sel ? C.white : slot.avail ? C.black : C.g400,
                cursor: slot.avail ? 'pointer' : 'not-allowed',
                fontFamily: "'Noto Sans KR', sans-serif",
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3,
                transition: 'all 0.15s'
              }}>
                <span>{slot.label}</span>
                {!slot.avail && <span style={{ fontSize: 11, color: C.g400 }}>마감</span>}
              </button>);

          })}
        </div>
        <CSNote />
      </div>

      <div style={bottomFixedStyle}>
        <button
          onClick={() => {if (!selTime) return;setLoading(true);setTimeout(() => {setLoading(false);onNext(selTime);}, 1000);}}

function KTApp({ initScreen = 'kakao' }) {
  const [screen, setScreen] = useState(initScreen);
  const [selDate, setSelDate] = useState(null);
  const [selTime, setSelTime] = useState(null);

  const go = (s) => setScreen(s);

  const screens = {
    kakaoB: <KakaoPreB onConfirm={() => go('confirmed')} onChange={() => go('otp_change')} onDetail={() => go('confirmed')} />,
    kakaoToday: <KakaoToday onCall={() => go('today')} onDetail={() => go('today')} />,
    kakao: <KakaoPreB onConfirm={() => go('confirmed')} onChange={() => go('otp_change')} onDetail={() => go('confirmed')} />,
    otp_confirm: <Screen1 onNext={() => go('confirmed')} />,
    otp_change: <Screen1 onNext={() => go('datepick')} />,
    otp: <Screen1 onNext={() => go('confirm')} />,
    confirm: <Screen2 onConfirm={() => go('confirmed')} onChange={() => go('datepick')} />,
    confirmed: <Screen3 onClose={() => go('confirm')} />,
    datepick: <Screen4 onNext={(d) => {setSelDate(d);go('timepick');}} onBack={() => go('confirm')} />,
    timepick: <Screen5 selDate={selDate} onNext={(t) => {setSelTime(t);go('changedone');}} onBack={() => go('datepick')} />,
    changedone: <Screen6 selDate={selDate} selTime={selTime} onClose={() => go('confirm')} />,
    today: <Screen7Wrap initial="id" />,
    today_card: <Screen7Wrap initial="card" />,
    err1: <ErrScreen title="예약 정보를 확인할 수 없습니다" desc={'현재 예약 정보를 확인할 수 없습니다.\n자세한 사항은 고객센터로 문의해 주세요.'} />,
    err2: <ErrScreen title="선택하신 시간대가 마감되었습니다" desc="현재 예약 정보를 확인할 수 없습니다. 자세한 사항은 고객센터로 문의해 주세요." onBack={() => go('timepick')} />,
    err3: <ErrScreen title="온라인 예약 변경 불가" desc="원스톱 서비스는 웹에서 예약 변경이 불가합니다." extra="고객센터로 문의해 주세요." />,

  };

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}>
      <div key={screen} style={{ width: '100%', height: '100%', animation: 'slideIn 0.2s ease' }}>

    </div>);

}
